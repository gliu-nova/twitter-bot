name: Twitter Bot

on:
  # Primary: external cron → workflow_dispatch (see scripts/EXTERNAL_CRON.md).
  # Backup: native schedule (best-effort; may delay hours during GitHub load).
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: manual
        type: choice
        options:
          - manual
          - external-cron

# Prevent overlapping runs if a fetch takes longer than one hour.
concurrency:
  group: twitter-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }} source=${{ github.event.inputs.source || 'schedule' }}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore SQLite state
        uses: actions/cache@v5
        with:
          path: data
          key: bot-data-v1
          restore-keys: bot-data-v1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets and APIs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          # Full Twitter check only on manual dispatch. Scheduled + external-cron skip get_me.
          CHECK_TWITTER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != 'external-cron' && '1' || '0' }}
          TWITTER_VALIDATE_MIN_HOURS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != 'external-cron' && '0' || '24' }}
        run: python run.py --validate

      - name: Run bot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          DRY_RUN: "0"
        run: python run.py