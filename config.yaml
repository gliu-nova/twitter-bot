# Per-indicator alert thresholds.
#
# Tier fields (auto-generate a rule from normal_alert):
#   normal_alert / major_alert / emergency_alert — custom per indicator
#   alert_unit: percent (default) | absolute (rates, CPI YoY, spreads)
#
# Explicit rules (optional, merged with tier rule):
#   percent_change, absolute_change, crosses_above, crosses_below, above, below
#
# First poll stores a baseline; change/cross rules fire from the second poll onward.

defaults:
  cooldown_hours: 24
  # quality.schedule: us_equity | crypto_24_7 | macro (auto-set by source if omitted)
  # quality.max_stale_hours: reject data older than this
  # quality.verify: optional second source { source, symbol/series, tolerance_pct }

indicators:
  sp500:
    name: "S&P 500"
    source: yahoo
    symbol: "^GSPC"
    cooldown_hours: 12
    normal_alert: 2
    major_alert: 3
    emergency_alert: 5
    quality:
      verify:
        source: fred
        series: SP500
        tolerance_pct: 0.75

  nasdaq100:
    name: "NASDAQ 100"
    source: yahoo
    symbol: "^NDX"
    cooldown_hours: 12
    normal_alert: 3
    major_alert: 4
    emergency_alert: 6

  vix:
    name: "VIX"
    source: yahoo
    symbol: "^VIX"
    cooldown_hours: 6
    normal_alert: 15
    major_alert: 25
    emergency_alert: 35
    rules:
      - type: crosses_above
        value: 30
      - type: crosses_below
        value: 15

  dxy:
    name: "US Dollar Index (DXY)"
    source: yahoo
    symbol: "DX-Y.NYB"
