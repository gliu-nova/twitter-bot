name: Twitter Bot

on:
  # Hourly at :31 UTC via external cron → workflow_dispatch (scripts/EXTERNAL_CRON.md).
  # Native schedule removed: GitHub cron is best-effort and was firing 15–30+ min late,
  # causing duplicate runs alongside the external trigger.
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: manual
        type: choice
        options:
          - manual
          - external-cron

# Prevent overlapping runs if a fetch takes longer than one hour.
concurrency:
  group: twitter-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # CI has no sibling ../market-memory checkout; store DuckDB under cached data/.
      MARKET_MEMORY_DATA_DIR: data/market_memory
      # Secret name in repo settings must match (COINALYZE_API_KEY or coinalyze_api_key).
      COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY || secrets.coinalyze_api_key }}
      OPS_HUB_URL: ${{ vars.OPS_HUB_URL || 'https://ops-hub-8ek.pages.dev' }}
      OPS_HEARTBEAT_SECRET: ${{ secrets.OPS_HEARTBEAT_SECRET }}
      BOT_TRIGGER_SOURCE: ${{ github.event.inputs.source || github.event_name }}

    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }} source=${{ github.event.inputs.source || 'schedule' }}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore SQLite state
        id: cache-db
        uses: actions/cache/restore@v5
        with:
          path: data
          # Per-run key on save; restore-keys picks up the latest branch cache.
          key: bot-data-v3-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            bot-data-v3-${{ github.ref_name }}-

      - name: Log cache restore
        run: |
          echo "cache-hit=${{ steps.cache-db.outputs.cache-hit }}"
          echo "cache-key=${{ steps.cache-db.outputs.cache-primary-key }}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secrets and APIs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          # Full Twitter check only on manual dispatch. Scheduled + external-cron skip get_me.
          CHECK_TWITTER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != 'external-cron' && '1' || '0' }}
          TWITTER_VALIDATE_MIN_HOURS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != 'external-cron' && '0' || '24' }}
        run: python run.py --validate

      - name: Run bot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          DRY_RUN: "0"
        run: python run.py

      - name: Log SQLite state
        if: always()
        run: |
          if [[ -f data/indicators.db ]]; then
            echo "indicators.db size: $(wc -c < data/indicators.db) bytes"
            python - <<'PY'
          import sqlite3
          conn = sqlite3.connect("data/indicators.db")
          readings = conn.execute("SELECT COUNT(*) FROM readings").fetchone()[0]
          posts = conn.execute("SELECT COUNT(*) FROM post_log").fetchone()[0]
          pending = conn.execute("SELECT COUNT(*) FROM pending_alerts WHERE processed = 0").fetchone()[0]
          print(f"readings={readings} posts={posts} pending_alerts={pending}")
          PY
          else
            echo "indicators.db missing"
          fi

      - name: Save SQLite state
        uses: actions/cache/save@v5
        if: always() && hashFiles('data/indicators.db') != ''
        with:
          path: data
          key: bot-data-v3-${{ github.ref_name }}-${{ github.run_id }}