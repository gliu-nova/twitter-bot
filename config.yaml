# Per-indicator alert rules — each indicator has its own `rules` list.
# Any matching rule triggers a tweet (subject to cooldown_hours).
#
# Rule types:
#   percent_change:     { threshold: 10 }           # ±10% vs last stored reading
#   percent_from_baseline: { baseline: 100, threshold: 50 }
#   above:              { value: 30 }              # value currently above level
#   below:              { value: 0 }               # value currently below level
#   crosses_above:      { value: 0 }               # was below, now at/above
#   crosses_below:      { value: 0 }               # was above, now at/below
#
# First poll stores a baseline; percent/cross rules fire from the second poll onward.

defaults:
  cooldown_hours: 24
  # quality.schedule: us_equity | crypto_24_7 | macro (auto-set by source if omitted)
  # quality.max_stale_hours: reject data older than this
  # quality.verify: optional second source { source, symbol/series, tolerance_pct }

indicators:
  sp500:
    name: "S&P 500"
    source: yahoo
    symbol: "^GSPC"
    cooldown_hours: 12
    quality:
      verify:
        source: fred
        series: SP500
        tolerance_pct: 0.75
    rules:
      - type: percent_change
        threshold: 3

  nasdaq100:
    name: "NASDAQ 100"
    source: yahoo
    symbol: "^NDX"
    cooldown_hours: 12
    rules:
      - type: percent_change
        threshold: 4

  vix:
    name: "VIX"
    source: yahoo
    symbol: "^VIX"
    cooldown_hours: 6
    rules:
      - type: percent_change
        threshold: 15
      - type: crosses_above
        value: 30

  dxy:
    name: "US Dollar Index (DXY)"
    source: yahoo
    symbol: "DX-Y.NYB"
    rules:
      - type: percent_change
        threshold: 2

  gold:
    name: "Gold"
    source: yahoo
    symbol: "GC=F"
    rules:
      - type: percent_change
        threshold: 3

  silver:
    name: "Silver"
    source: yahoo
    symbol: "SI=F"
    rules:
      - type: percent_change
        threshold: 5

  oil:
    name: "WTI Crude Oil"
    source: fred
    series: DCOILWTICO
    rules:
      - type: percent_change
        threshold: 8

  move:
    name: "MOVE Index"
    source: yahoo
    symbol: "^MOVE"
    quality:
      max_stale_hours: 168
    rules:
      - type: percent_change
        threshold: 10
      - type: crosses_above
        value: 120

  hy_spread:
    name: "High Yield Credit Spread"
    source: fred
    series: BAMLH0A0HYM2
    rules:
      - type: percent_change
        threshold: 10
      - type: crosses_above
        value: 5

  btc:
    name: "Bitcoin"
    source: yahoo
    symbol: "BTC-USD"
    cooldown_hours: 6
    quality:
      schedule: crypto_24_7
      max_stale_hours: 4
      verify:
        source: kraken
        pair: XBTUSD
        tolerance_pct: 0.5
    rules:
      - type: percent_change
        threshold: 8

  eth:
    name: "Ethereum"
    source: yahoo
    symbol: "ETH-USD"
    cooldown_hours: 6
    quality:
      schedule: crypto_24_7
      max_stale_hours: 4
      verify:
        source: kraken
        pair: ETHUSD
        tolerance_pct: 0.5
    rules:
      - type: percent_change
        threshold: 10

  sol:
    name: "Solana"
    source: yahoo
    symbol: "SOL-USD"
    cooldown_hours: 6
    quality:
      schedule: crypto_24_7
      max_stale_hours: 4
      verify:
        source: kraken
        pair: SOLUSD
        tolerance_pct: 1.0
    rules:
      - type: percent_change
        threshold: 12

  fear_greed:
    name: "Crypto Fear & Greed Index"
    source: fear_greed
    cooldown_hours: 12
    rules:
      - type: crosses_below
        value: 25
      - type: crosses_above
        value: 75

  fed_funds:
    name: "Fed Funds Rate"
    source: fred
    series: DFF
    cooldown_hours: 168
