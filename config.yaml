      - type: percent_change
        threshold: 2

  ism_services:
    name: "ISM Services PMI proxy (Chicago Fed Nonmfg)"
    source: fred
    series: CFSBCACTIVITYNMFG
    cooldown_hours: 168
    rules:
      - type: percent_change
        threshold: 15
      - type: crosses_below
        value: 0

  unemployment:
    name: "Unemployment Rate"
    source: fred
    series: UNRATE
    cooldown_hours: 168
    rules:
