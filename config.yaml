# Data polling — how often to fetch each tier (posting rules unchanged).
# launchd ticks every tick_minutes; each indicator fetches on its own schedule.
scheduler:
  tick_minutes: 15
  crypto_minutes: 10
  market_minutes: 10
  market_off_hours_minutes: 60
  rates_minutes: 30
  macro_hours: 6
  housing_hours: 24

# Posting engine — scoring, grouping, daily cap, buffers.
# Threshold rules per indicator are still edited under `indicators:` below.
posting:
  daily_post_cap: 2          # regular posts only; emergencies bypass this cap
  emergency_threshold: 90
  high_single_threshold: 85
  multi_threshold: 120
  min_cluster_size: 3
  market_buffer_minutes: 30
  group_time_window_hours: 8
  indicator_cooldown_hours: 36
  alert_max_age_hours: 12
  max_crypto_streak: 2
  diversity_lookback: 3
  magnitude_cap_pct: 25
  magnitude_cap_absolute: 1.0
  score_weights:
    magnitude: 0.45
    rarity: 0.30
    audience: 0.25

  indicator_themes:
    btc:
      themes: [risk_on, crypto]
      category: crypto
      rarity: 70
      audience_relevance: 85
    eth:
      themes: [risk_on, crypto]
      category: crypto
      rarity: 65
      audience_relevance: 80
    sol:
      themes: [risk_on, crypto]
      category: crypto
      rarity: 60
      audience_relevance: 70
    btc_funding:
      themes: [crypto, risk_on]
      category: crypto
      rarity: 75
      audience_relevance: 80
    eth_funding:
      themes: [crypto, risk_on]
      category: crypto
      rarity: 70
      audience_relevance: 75
    sol_funding:
      themes: [crypto, risk_on]
      category: crypto
      rarity: 65
      audience_relevance: 70
    btc_basis:
      themes: [crypto, risk_on]
      category: crypto
      rarity: 70
      audience_relevance: 75
    eth_basis:
      themes: [crypto, risk_on]
      category: crypto
      rarity: 65
      audience_relevance: 70
    sol_basis:
      themes: [crypto, risk_on]
      category: crypto
      rarity: 60
      audience_relevance: 65
    btc_exchange_spread:
      themes: [crypto]
      category: crypto
      rarity: 80
      audience_relevance: 75
    eth_exchange_spread:
      themes: [crypto]
      category: crypto
      rarity: 75
      audience_relevance: 70
    sol_exchange_spread:
      themes: [crypto]
      category: crypto
      rarity: 70
      audience_relevance: 65
    btc_liquidations:
      themes: [crypto, risk_off]
      category: crypto
      rarity: 85
      audience_relevance: 85
      standalone_major: true
    eth_liquidations:
      themes: [crypto, risk_off]
      category: crypto
      rarity: 80
      audience_relevance: 80
