name: Twitter Bot

on:
  schedule:
    # Every hour at :17 past — avoids :00 congestion on GitHub's scheduler.
    - cron: "17 * * * *"
  workflow_dispatch:

# Prevent overlapping runs if a fetch takes longer than one hour.
concurrency:
  group: twitter-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore SQLite state
        uses: actions/cache@v5
        with:
          path: data
          key: bot-data-v1
          restore-keys: bot-data-v1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets and APIs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          # Scheduled runs: secrets + data APIs only (no get_me). Manual runs: full Twitter check.
          CHECK_TWITTER: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          TWITTER_VALIDATE_MIN_HOURS: ${{ github.event_name == 'workflow_dispatch' && '0' || '24' }}
        run: python run.py --validate

      - name: Run bot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          DRY_RUN: "0"
        run: python run.py